title: Registry Run Key Persistence from User-Writable Path
id: af33e727-dd6a-4169-9a6e-b5a0fa171a36
status: experimental
description: Detects Run or RunOnce registry values pointing to executables located in user-writable directories such as AppData.
author: Franco Zelaya
date: 2026-07-23

logsource:
    category: registry_set
    product: windows

detection:
    selection_registry:
        TargetObject|contains:
            - '\Software\Microsoft\Windows\CurrentVersion\Run'
            - '\Software\Microsoft\Windows\CurrentVersion\RunOnce'

    selection_path:
        Details|contains:
            - '\AppData\Roaming\'
            - '\AppData\Local\Temp\'

    condition: selection_registry and selection_path

falsepositives:
    - Legitimate applications configuring user-level startup persistence
    - Software updaters installed in user profile directories

level: high

tags:
    - attack.persistence
    - attack.t1547.001